<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Progression</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:30px;
}

h1,p{
    text-align:center;
}

.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px 0 30px 0;
    flex-wrap:wrap;
}

select{
    padding:10px 14px;
    font-size:16px;
    border-radius:8px;
    border:none;
}

.chart-wrapper{
    width:95%;
    max-width:1400px;
    height:750px;
    margin:30px auto;
}
</style>
</head>

<body>

<h1>World Record Progression</h1>
<p id="subtitle"></p>

<div class="controls">
    <select id="eventSelect"></select>

    <select id="sexSelect">
        <option value="male">male</option>
        <option value="female">female</option>
    </select>
</div>

<div class="chart-wrapper">
    <canvas id="recordChart"></canvas>
</div>

<script>
let allData = {};
let chartInstance = null;

function makeKey(eventName, sex){
    return `${eventName}___${sex}`;
}

function updateChart(){
    const eventName = document.getElementById("eventSelect").value;
    const sex = document.getElementById("sexSelect").value;

    const key = makeKey(eventName, sex);
    const data = allData[key];

    if(!data){
        document.getElementById("subtitle").textContent =
            `No data for ${eventName} (${sex})`;

        if(chartInstance){
            chartInstance.destroy();
            chartInstance = null;
        }
        return;
    }

    document.getElementById("subtitle").textContent =
        `${data.event} (${data.sex}) — unit: ${data.unit}`;

    const ctx = document.getElementById("recordChart").getContext("2d");

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.dates,
            datasets: [{
                label: `${data.event} (${data.sex})`,
                data: data.performances,
                borderColor: "rgba(255,99,132,1)",
                backgroundColor: "rgba(255,99,132,0.2)",
                borderWidth: 3,
                pointRadius: 4,
                pointHoverRadius: 7,
                spanGaps: true,
                stepped: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,

            plugins: {
                title: {
                    display: true,
                    text: `Record progression — ${data.event} (${data.sex})`,
                    color: "white",
                    font: { size: 26 }
                },

                legend: {
                    labels: { color: "white" }
                },

                tooltip: {
                    callbacks: {
                        label: function(context){
                            const i = context.dataIndex;
                            return `Record: ${data.performances[i]} ${data.unit}`;
                        },
                        afterLabel: function(context){
                            const i = context.dataIndex;
                            return [
                                `Athlete: ${data.competitors[i]}`,
                                `Venue: ${data.venues[i]}`,
                                `Date: ${data.dates[i]}`
                            ];
                        }
                    }
                }
            },

            scales: {
                x: {
                    ticks: {
                        color: "white",
                        maxRotation: 45,
                        minRotation: 0
                    },
                    grid: {
                        color: "rgba(255,255,255,0.1)"
                    },
                    title: {
                        display: true,
                        text: "Date",
                        color: "white"
                    }
                },

                y: {
                    reverse: false,
                    ticks: {
                        color: "white"
                    },
                    grid: {
                        color: "rgba(255,255,255,0.1)"
                    },
                    title: {
                        display: true,
                        text: `Performance (${data.unit})`,
                        color: "white"
                    }
                }
            }
        }
    });
}

fetch("data.json")
    .then(response => response.json())
    .then(data => {
        allData = data;

        const eventNames = [...new Set(
            Object.values(allData).map(d => d.event)
        )].sort();

        const eventSelect = document.getElementById("eventSelect");

        eventNames.forEach(eventName => {
            const option = document.createElement("option");
            option.value = eventName;
            option.textContent = eventName;
            eventSelect.appendChild(option);
        });

        eventSelect.addEventListener("change", updateChart);
        document.getElementById("sexSelect").addEventListener("change", updateChart);

        updateChart();
    })
    .catch(error => console.error("Error loading data:", error));
</script>

</body>
</html>
